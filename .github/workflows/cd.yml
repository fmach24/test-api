name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/test-api 

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r app/requirements.txt
      - run: cd app && pytest test_main.py -v

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to ghcr.io
        run: echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          TAG=${{ github.sha }}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest app/
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

      - name: Update image tag in k8s manifest
        run: |
          TAG=${{ github.sha }}
          sed -i "s|image: ghcr.io.*|image: $IMAGE:$TAG|" k8s/deployment.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to $TAG"
          git push