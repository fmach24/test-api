apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: ghcr.io/fmach24/test-api:8c2f2c0af20b5e199b848f6972a0c17022328d4d
          ports:
            - containerPort: 8000
          env:
            - name: APP_VERSION
              value: "1.0.0" #TODO version to short sha z github