apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: ghcr.io/fmach24/test-api:5787a88d0526d1973a27173423eb77e7d1ff66f6
          ports:
            - containerPort: 8000
          env:
            - name: APP_VERSION
              value: "1.0.0" #TODO version to short sha z github